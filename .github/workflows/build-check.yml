name: Build check

# extension.js is NOT committed (it's the generated bundle; CI builds it into the
# release .zip — see release.yml). This job guards the SOURCE: it builds the
# bundle from src/ and fails if the build breaks or the output isn't valid JS.

on:
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "build.mjs"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "src/**"
      - "build.mjs"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Install build tooling
        run: npm ci
      - name: Build extension.js from src/
        run: node build.mjs
      - name: Syntax check the built bundle
        run: node --check extension.js
